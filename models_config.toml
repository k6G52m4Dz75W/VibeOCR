# VibeOCR 模型配置文件
# 使用 TOML 格式，支持热插拔：通过 --config 加载自定义配置
#
# 格式说明：
#   [prompts]                  — 通用提示词库（放在最前，避免每个模型重复粘贴）
#   [defaults]
#     default_model             — 默认模型 key
#     default_prompt            — 模型未显式指定 prompt_ref 时使用的通用提示词
#   [meta]                      — 元数据提取（utils_extract_meta.py）独立提示词
#     prompt                    — 原写死在代码里的提示词，抽离到此便于修改
#   [models.模型名称]          — 模型配置段
#     prompt_ref = "default"    — 引用 [prompts] 中的命名提示词（推荐）
#     prompt_ref = ""            — 显式置空（异步任务模型，无需 prompt）
#     prompt = """..."""        — 也可内联一次性提示词（覆盖引用，旧格式兼容）
#     api_key_env = "none"     — 无需鉴权（本地模型如 LM Studio）；"none"/"no"/空 均视为免 key
#   [models.模型名称.headers]     — HTTP 请求头（可选）
#   [models.模型名称.payload_template] — 请求体模板（可选）
#   note = "..."                 — 备注说明（可选）

# ============================================================
# 通用提示词库（放在最前，供各模型引用）
# ============================================================

[prompts]

# 默认提示词：小说/书籍扫描件正文提取（通用，多数模型共用；含"逐字不替换"约束）
default = """
这是一部小说的扫描文件，请提取正文。
要求：
1. 保持段落结构，识别跨页段落，合并被分页打断的段落
2. 删除页脚中的页码和其他装饰性文字和图样，以及右下方的请开通会员和XX扫描王的水印图案。
3. 请直接输出纯文本，严格忠实于原文，不增加，遗漏，修改原文文本。
4. 严禁改写、替换同义词或调整语序（例如禁止将"为何"改为"为什么"、将"一定能"改为"一定能够"）。
5. 使用规范的中文全角标点符号。
"""

# 外文书籍扫描件提取（与 default 对齐的英文版）
default_en = """
Extract the main text from this scanned novel page.
Requirements:
1. Maintain paragraph structure, identify paragraphs spanning pages, and merge paragraphs broken across pages
2. Remove page numbers and other decorative text/graphics in the footer, as well as "subscribe to membership" prompts and scanner-app watermark images
3. Output plain text only, strictly faithful to the original — do not add, omit, or alter any text
4. Do not rewrite, substitute synonyms, or reorder words; transcribe verbatim
5. Use standard punctuation appropriate to the original language
"""

# ============================================================
# 默认配置
# ============================================================

[defaults]
default_model = "siliconflow_deepseek-ocr"
default_prompt = "default"

# ============================================================
# 元数据提取（utils_extract_meta.py）独立提示词
# 从代码抽离到此，便于直接修改，无需动 .py
# ============================================================

[meta]
prompt = """
从图书的版权页图片提取文字，识别整理后直接返回以下2项数据，不要添加任何额外说明：

第1项，符合电子书 EPUB 规范的 meta.yaml 元数据。根据以下模板和说明直接返回YAML的内容，第1项开始和结束用---标记：
---
title: # 书名(若有副标题的话返回如下列表，否则直接返回书名）
- type: main
  text: # 书名
- type: subtitle
  text: # 副标题
creator: # 作者（若作者姓名之间包含顿号、则作为不同的作者返回列表）
- role: author
  text: # 姓名
identifier:
  scheme: ISBN-13
  text: 'urn:isbn:' # 'urn:isbn:去除-的13位书号'
publisher: # 出版社
date: # 出版日期，格式为YYYY-MM-DD，只有年份是必须的
lang: zh-CN # 根据版权页语言判断书籍语言
contributor:
  - role: editor
    text: # 编辑姓名（若有多位则返回列表）
  - role: printer
    text: # 印制人员姓名（若有多位则返回列表）
---
第2项，原始文本内容整理成的表格，左边是字段名，例如书名，作者等，右边是值，例如书的真正名字，作者的姓名等，表头留空，表格前面加上"# 出版信息"，直接返回给我符合markdown格式的文本。"""

# ============================================================
# SiliconFlow
# ============================================================

[models.siliconflow_deepseek-ocr]
name = "SiliconFlow - DeepSeek-OCR"
api_url = "https://api.siliconflow.cn/v1/chat/completions"
model_id = "deepseek-ai/DeepSeek-OCR"
api_key_env = "SILICONFLOW_API_KEY"
batch_size = 1
timeout = 120
content_format = "openai"
note = "总上下文限制8K，max_tokens建议不超过4096"
prompt = """
<|grounding|>Convert the document to markdown.
"""

[models.siliconflow_deepseek-ocr.headers]
Accept = "text/event-stream"
Content-Type = "application/json"

[models.siliconflow_deepseek-ocr.payload_template]
max_tokens = 4096
temperature = 0.0
stream = true

[models."siliconflow_paddleocr-vl-1.5"]
name = "SiliconFlow - PaddleOCR-VL-1.5"
api_url = "https://api.siliconflow.cn/v1/chat/completions"
model_id = "PaddlePaddle/PaddleOCR-VL-1.5"
api_key_env = "SILICONFLOW_API_KEY"
batch_size = 1
timeout = 120
content_format = "openai"
note = "总上下文限制8K，max_tokens建议不超过4096"
prompt = ""

[models."siliconflow_paddleocr-vl-1.5".headers]
Accept = "text/event-stream"
Content-Type = "application/json"

[models."siliconflow_paddleocr-vl-1.5".payload_template]
max_tokens = 4096
temperature = 0.0
stream = true

