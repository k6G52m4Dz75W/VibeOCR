# ============================================================
# PaddleOCR 系列（异步任务，无需 prompt）
# ============================================================

[models.paddleocr_vl]
name = "PaddleOCR-VL-1.6 (AIStudio 异步API)"
api_url = "https://paddleocr.aistudio-app.com/api/v2/ocr/jobs"
model_id = "PaddleOCR-VL-1.6"
api_key_env = "PADDLEOCR_API_KEY"
batch_size = 1
timeout = 30
content_format = "paddleocr_async"
note = "异步任务模式：提交PDF后轮询获取结果，结果返回markdown格式。支持PDF直接上传，无需预先转图片。"

[models.paddleocr_vl.headers]
Accept = "application/json"

[models.paddleocr_vl.payload_template]
useDocOrientationClassify = false
useDocUnwarping = false
useChartRecognition = false
useLayoutDetection = true
prettifyMarkdown = false
visualize = false

# -------------------------------------------

[models.paddleocr_v6]
name = "PP-OCRv6 (AIStudio 异步API)"
api_url = "https://paddleocr.aistudio-app.com/api/v2/ocr/jobs"
model_id = "PP-OCRv6"
api_key_env = "PADDLEOCR_API_KEY"
batch_size = 1
timeout = 30
content_format = "paddleocr_v6"
note = "异步任务模式：提交PDF后轮询获取结果，结果返回ocrResults结构（含识别文本和区域图片URL）。"

[models.paddleocr_v6.headers]
Accept = "application/json"

[models.paddleocr_v6.payload_template]
useDocOrientationClassify = false
useDocUnwarping = false
useTextlineOrientation = false

# ============================================================
# MinerU（异步任务，无需 prompt）
# ============================================================

[models.mineru_precision]
name = "MinerU Precision Extract API (v4)"
api_url = "https://mineru.net/api/v4"
model_id = "vlm"
api_key_env = "MINERU_API_KEY"
batch_size = 1
timeout = 30
content_format = "mineru_async"
note = "MinerU 高精度提取API。支持200MB/200页。流程：申请上传URL -> PUT上传文件 -> 轮询batch结果 -> 下载zip提取full.md。扫描件请务必开启is_ocr。"

[models.mineru_precision.headers]
Accept = "application/json"
Content-Type = "application/json"

[models.mineru_precision.payload_template]
model_version = "vlm"
is_ocr = true
enable_formula = true
enable_table = true
language = "ch"
extra_formats = []

# ============================================================
# 自定义模板（供用户复制使用）
# ============================================================

[models.custom]
name = "自定义API"
api_url = "https://your-api-endpoint.com/v1/chat/completions"
model_id = "your-model-name"
api_key_env = "CUSTOM_API_KEY"
batch_size = 1
timeout = 180
content_format = "openai"
prompt = """
请从扫描图片中提取文本内容。
要求：保持原文结构，删除页码水印，使用规范标点。
"""

[models.custom.headers]
Accept = "application/json"

[models.custom.payload_template]
max_tokens = 4096
temperature = 0.2
top_p = 1.0
stream = false
