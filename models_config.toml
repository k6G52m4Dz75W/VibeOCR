# ============================================================
# SiliconFlow
# ============================================================

[models.siliconflow_deepseek-ocr]
name = "SiliconFlow / DeepSeek-OCR"
api_url = "https://api.siliconflow.cn/v1/chat/completions"
model_id = "deepseek-ai/DeepSeek-OCR"
api_key_env = "SILICONFLOW_API_KEY"
batch_size = 1
timeout = 120
content_format = "openai"
note = "总上下文限制8K，max_tokens建议不超过4096"
prompt = """
<tr>
<|grounding|>Convert the document to markdown.
"""

[models.siliconflow_deepseek-ocr.headers]
Accept = "application/json"
Content-Type = "application/json"

[models.siliconflow_deepseek-ocr.payload_template]
max_tokens = 4096
temperature = 0.2
top_p = 1.0
stream = true

# ============================================================
# OpenAI
# ============================================================

[models.openai_gpt4o]
name = "OpenAI / GPT-4o"
api_url = "https://api.openai.com/v1/chat/completions"
model_id = "gpt-4o"
api_key_env = "OPENAI_API_KEY"
batch_size = 2
timeout = 180
content_format = "openai"
prompt = """
Extract the main text from this scanned novel page.
Requirements:
1. Maintain paragraph structure, merge paragraphs broken across pages
2. Remove page numbers, watermarks, and advertisements
3. Output plain text only, strictly faithful to the original
4. Use standard Chinese full-width punctuation
"""

[models.openai_gpt4o.headers]
Accept = "application/json"

[models.openai_gpt4o.payload_template]
max_tokens = 4096
temperature = 0.2
top_p = 1.0
stream = false

# ============================================================
# Anthropic
# ============================================================

[models.anthropic_claude]
name = "Anthropic / Claude 3.5 Sonnet"
api_url = "https://api.anthropic.com/v1/messages"
model_id = "claude-3-5-sonnet-20241022"
api_key_env = "ANTHROPIC_API_KEY"
batch_size = 2
timeout = 180
content_format = "anthropic"
prompt = """
请提取这部扫描小说的正文内容。
要求：
1. 保持段落结构，合并被分页打断的段落
2. 删除页脚页码、水印文字和广告图案
3. 直接输出纯文本，忠实原文不做修改
4. 使用中文全角标点符号
5. 如遇模糊文字，结合上下文推断
"""

[models.anthropic_claude.headers]
Accept = "application/json"
anthropic-version = "2023-06-01"

[models.anthropic_claude.payload_template]
max_tokens = 4096
temperature = 0.2

