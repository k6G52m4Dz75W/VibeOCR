# VibeOCR 模型配置文件
# 使用 TOML 格式，支持热插拔：通过 --config 加载自定义配置
#
# 格式说明：
#   [models.模型名称]            — 模型配置段
#   [models.模型名称.headers]     — HTTP 请求头（可选）
#   [models.模型名称.payload_template] — 请求体模板（可选）
#   prompt = """..."""           — 多行提示词（可选，异步模型可为空）
#   note = "..."                 — 备注说明（可选）

[defaults]
default_model = "siliconflow_deepseek-ocr"

# ============================================================
# NVIDIA NIM 系列
# ============================================================

[models.nvidia_kimi]
name = "NVIDIA NIM / Kimi K2.6"
api_url = "https://integrate.api.nvidia.com/v1/chat/completions"
model_id = "moonshotai/kimi-k2.6"
api_key_env = "NVIDIA_API_KEY"
batch_size = 5
timeout = 180
content_format = "openai"
prompt = """
请逐字提取图片中的文本，严禁改写、替换同义词或调整语序。
要求：
1. 逐字转录，保持原文每一个字、每一个标点不变
2. 禁止将"为何"改为"为什么"，禁止将"一定能"改为"一定能够"等任何同义替换
3. 保持段落结构，识别跨页段落，合并被分页打断的段落
4. 删除页脚中的页码和风眼文字和图样，以及右下方的请开通会员和XX扫描王的水印图案
5. 使用规范的中文全角标点符号
6. 严格忠实于原文，不增加、遗漏、修改任何文字
"""

[models.nvidia_kimi.headers]
Accept = "application/json"

[models.nvidia_kimi.payload_template]
max_tokens = 16384
temperature = 0.1
top_p = 1.0
stream = false
chat_template_kwargs = { thinking = false }

# -------------------------------------------

[models.nvidia_step]
name = "NVIDIA NIM / step-3.7-flash"
api_url = "https://integrate.api.nvidia.com/v1/chat/completions"
model_id = "stepfun-ai/step-3.7-flash"
api_key_env = "NVIDIA_API_KEY"
batch_size = 5
timeout = 180
content_format = "openai"
prompt = """
这是一部小说的扫描文件，请提取正文。
要求：
1. 保持段落结构，识别跨页段落，合并被分页打断的段落
2. 删除页脚中的页码和风眼文字和图样，以及右下方的请开通会员和XX扫描王的水印图案。
3. 请直接输出纯文本，严格忠实于原文，不增加，遗漏，修改原文文本。
4. 使用规范的中文全角标点符号。
"""

[models.nvidia_step.headers]
Accept = "application/json"

[models.nvidia_step.payload_template]
max_tokens = 16384
temperature = 0.1
top_p = 0.95
stream = true

# -------------------------------------------

[models.nvidia_nemotron]
name = "NVIDIA NIM / Nemotron-3-Nano"
api_url = "https://integrate.api.nvidia.com/v1/chat/completions"
model_id = "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning"
api_key_env = "NVIDIA_API_KEY"
batch_size = 5
timeout = 180
content_format = "openai"
prompt = """
这是一部小说的扫描文件，请提取正文。
要求：
1. 保持段落结构，识别跨页段落，合并被分页打断的段落
2. 删除页脚中的页码和风眼文字和图样，以及右下方的请开通会员和XX扫描王的水印图案。
3. 请直接输出纯文本，严格忠实于原文，不增加，遗漏，修改原文文本。
4. 使用规范的中文全角标点符号。
